version: 2.1
jobs:
  hello_world_5:
    docker:
      - image: python:3.8-slim
    steps:
      - run:
          name: Sleep 1 second and Print Hello Again
          command: |
            sleep 1
            echo "Hello, Again!"
workflows:
  version: 2
  new_workflow:
    jobs:
      - hello_world_5
