version: 2.1
jobs:
  hello_world_7:
    docker:
      - image: python:3.8-slim
    steps:
      - run:
          name: Sleep 1 second and Print Hello World
          command: |
            sleep 1
            echo "Hello, World!"
workflows:
  version: 2
  new_workflow:
    jobs:
      - hello_world_7
