version: 2.1
jobs:
  hello_world_7:
    docker:
      - image: circleci/python:3.8
    steps:
      - run:
          name: Sleep 7 seconds and Print Hello World
          command: |
            sleep 7
            echo "Hello, World!"
  hello_world_14:
    docker:
      - image: circleci/python:3.8
    steps:
      - run:
          name: Sleep 14 seconds and Print Message
          command: |
            sleep 14
            echo "This job will no longer fail"
      - run:
          name: Sleep 10 seconds
          command: sleep 10
      - run:
          name: Sleep another 10 seconds
          command: sleep 10
  sleep_and_fail:
    docker:
      - image: circleci/python:3.8
    steps:
      - run:
          name: Sleep 12 seconds and Fail
          command: |
            sleep 12
            echo "This job will fail"
            exit 1
workflows:
  version: 2
  new_workflow:
    jobs:
      - hello_world_7
      - hello_world_14
      - sleep_and_fail
