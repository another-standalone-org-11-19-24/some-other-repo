          name: Sleep 14 seconds and Print Hello World
          command: |
            sleep 14
            echo "Hello, World!"
  hello_world_21:
    docker:
      - image: circleci/python:3.8
    steps:
      - run:
          name: Sleep 21 seconds and Print Hello World
          command: |
            sleep 21
            echo "Hello, World!"
  hello_world_28:
    docker:
      - image: circleci/python:3.8
    steps:
      - run:
          name: Sleep 28 seconds and Print Hello World
          command: |
            sleep 28
            echo "Hello, World!"
workflows:
  version: 2
  sleep_workflows:
    jobs:
      - hello_world_7
      - hello_world_14
      - hello_world_21
      - hello_world_28
