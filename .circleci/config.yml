version: 2.1
jobs:
  hello_world_7:
    docker:
      - image: python:3.8-slim
    steps:
      - run:
          name: Sleep 1 second and Print Hello World
          command: |
            sleep 1
            echo "Hello, World!"
  hello_world_14:
    docker:
      - image: python:3.8-slim
    steps:
      - run:
          name: Sleep 1 second and Print Message
          command: |
            sleep 1
            echo "This job will no longer fail"
      - run:
          name: Sleep 1 second
          command: sleep 1
      - run:
          name: Sleep another 1 second
          command: sleep 1
  sleep_two_seconds:
    docker:
      - image: python:3.8-slim
    steps:
      - run:
          name: Sleep 2 seconds
          command: sleep 2
workflows:
  version: 2
  new_workflow:
    jobs:
      - hello_world_7
      - hello_world_14
      - sleep_two_seconds
